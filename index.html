<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA Audio</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<header>
<div class="header">

     <div class="left">
       <div class="nav-item">
        <img id="menu" class="icon" src="img/menu.png" alt="menu">
        <span>Menu</span>
        </div>
     </div>

    <div class="logo">
        <img class="logo" src="img/logo.png" alt="logo">
    </div>

    <div class="right">
        <div class="nav-item">
        <img class="icon" src="img/konto.png" alt="konto">
            <span>Konto</span>
        </div>
        <div class="nav-item">
        <img class="icon" src="img/search.png" alt="søg">
            <span>Søg</span>
        </div>
        <div class="nav-item">
        <img class="icon" src="img/shoppingcard.png" alt="kurv">
            <span>Kurv</span>
        </div>
    </div>
</div>
</header>

<body>
    <section class="hero">
        <div class="hero-text">
                <h4>LUMINA One</h4>
                <h1>Designet til<br>DIN <span class="highlight">hverdag</span></h1>
                <p>Kraftig lyd. Elegant design.<br>Bygget til at følge dig overalt.</p>
                <!-- tilføj cta kanpper -->
            <div class="cta-buttons">
                <a href="#produkt" class="btn btn-primary">Køb LUMINA ONE</a>
                <a href="#produkt" class="btn btn-secondary">Se produktet →</a>
            </div>
        </div>

        
            <div class="hero-features">
                <div class="feature">
                <div class="feature-icon">
                    <img src="img/batteri-icon.png" alt="Batteri ikon">
                </div>
                <p>Op til 20 timers<br>spilletid</p>
            </div>

        <div class="feature">
            <div class="feature-icon">
                <img src="img/sound-icon.png" alt="Lyd ikon">
            </div>
            <p>100 dB kraftfuld<br>lyd</p>
        </div>

        <div class="feature">
            <div class="feature-icon">
                <img src="img/buletooth-icon.png" alt="Bluetooth ikon">
            </div>
            <p>Bluetooth 5.3 for<br>stabil forbindelse</p>
        </div>

        <div class="feature">
            <div class="feature-icon">
                <img src="img/color-icon.png" alt="Farver ikon">
            </div>
            <p>Vælg mellem 4<br>unikke farver</p>
        </div>
        </div>
    </section>
</body>
</html>
